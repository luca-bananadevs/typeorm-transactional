name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  changeset:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Require a changeset when src/ changes
        # `changeset status` ignores empty changesets, so check the diff directly:
        # PRs touching src/ must add a .changeset/*.md entry (empty ones count).
        run: |
          base="origin/${{ github.base_ref }}"
          changed=$(git diff --name-only "$base"...HEAD)
          if echo "$changed" | grep -q '^src/' && ! echo "$changed" | grep -Eq '^\.changeset/.*\.md$'; then
            echo "::error::This PR changes src/ but adds no changeset. Run 'npx changeset' (or 'npx changeset add --empty' for no-release changes)."
            exit 1
          fi
          echo "Changeset check passed."

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
      - run: npm ci
      - run: npm run check

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
      - run: npm ci
      - run: npm run build

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20.x', '22.x']
        # CLS_HOOKED is scheduled for removal (#3); both drivers are tested until then.
        storageDriver: ['ASYNC_LOCAL_STORAGE', 'CLS_HOOKED']
    services:
      postgres-simple:
        image: postgres:16-alpine
        ports:
          - 5435:5432
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: test
        options: >-
          --health-cmd "pg_isready -d test -U postgres"
          --health-interval 1s
          --health-timeout 5s
          --health-retries 10
      postgres-nest:
        image: postgres:16-alpine
        ports:
          - 5436:5432
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: test
        options: >-
          --health-cmd "pg_isready -d test -U postgres"
          --health-interval 1s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run test:ci
        env:
          TEST_STORAGE_DRIVER: ${{ matrix.storageDriver }}
