name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
      - run: npm ci
      - run: npm run check

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
      - run: npm ci
      - run: npm run build

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20.x', '22.x']
        # CLS_HOOKED is scheduled for removal (#3); both drivers are tested until then.
        storageDriver: ['ASYNC_LOCAL_STORAGE', 'CLS_HOOKED']
    services:
      postgres-simple:
        image: postgres:16-alpine
        ports:
          - 5435:5432
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: test
        options: >-
          --health-cmd "pg_isready -d test -U postgres"
          --health-interval 1s
          --health-timeout 5s
          --health-retries 10
      postgres-nest:
        image: postgres:16-alpine
        ports:
          - 5436:5432
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: test
        options: >-
          --health-cmd "pg_isready -d test -U postgres"
          --health-interval 1s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run test:ci
        env:
          TEST_STORAGE_DRIVER: ${{ matrix.storageDriver }}
